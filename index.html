<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyNexus — 質問解説の知識ベース</title>
  <style>
    :root {
      --bg: #f4f1ea;
      --ink: #2c2622;
      --accent: #b5402f;
      --accent-soft: #f3d9d2;
      --gold: #c79a3b;
      --card: #fffdf8;
      --line: #e2d9c8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", "Meiryo", sans-serif;
      background: var(--bg);
      color: var(--ink);
      line-height: 1.8;
      padding: 0 16px 64px;
    }
    header {
      max-width: 960px;
      margin: 0 auto;
      text-align: center;
      padding: 56px 24px 24px;
    }
    header .badge {
      display: inline-block;
      background: var(--accent);
      color: #fff;
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      padding: 6px 16px;
      border-radius: 999px;
      margin-bottom: 18px;
    }
    header h1 { font-size: 2.4rem; margin: 0 0 10px; letter-spacing: 0.04em; }
    header p { color: #6b6258; margin: 0; }
    main { max-width: 960px; margin: 0 auto; }
    .toolbar {
      display: flex; flex-wrap: wrap; gap: 10px;
      justify-content: center; margin: 28px 0 8px;
    }
    .chip {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .chip:hover, .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 18px;
      margin-top: 22px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px 24px;
      box-shadow: 0 6px 18px rgba(60,40,20,0.06);
      text-decoration: none;
      color: inherit;
      display: flex; flex-direction: column;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .card:hover { transform: translateY(-3px); box-shadow: 0 12px 26px rgba(60,40,20,0.12); }
    .card .cat {
      align-self: flex-start;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 6px;
      margin-bottom: 12px;
    }
    .card h2 { font-size: 1.25rem; margin: 0 0 10px; }
    .card .summary { font-size: 0.92rem; color: #6b6258; flex: 1; }
    .card .tags { margin-top: 14px; display: flex; flex-wrap: wrap; gap: 6px; }
    .card .tags span { font-size: 0.72rem; color: #8a8175; background: #faf6ee; border: 1px solid var(--line); padding: 2px 8px; border-radius: 999px; }
    .empty { text-align: center; color: #8a8175; padding: 40px; }
    footer { max-width: 960px; margin: 40px auto 0; text-align: center; color: #8a8175; font-size: 0.85rem; }
    @media (max-width: 520px) { header h1 { font-size: 1.8rem; } }
  </style>
</head>
<body>
  <header>
    <span class="badge">🌾 KNOWLEDGE BASE</span>
    <h1>MyNexus</h1>
    <p>「質問！」から生まれた解説ページの知識ベース</p>
  </header>

  <main>
    <div class="toolbar" id="categories"></div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none;">まだページがありません。</div>
  </main>

  <footer>
    <p>🌾 Generated by the <strong>question-explainer</strong> skill</p>
  </footer>

  <script>
    // data/pages.json を読み込んでカード一覧を描画する。
    // file:// で開いた場合に fetch が失敗することがあるため、その場合の案内も出す。
    let allPages = [];
    let activeCat = "すべて";

    async function load() {
      try {
        const res = await fetch("data/pages.json", { cache: "no-store" });
        const data = await res.json();
        allPages = data.pages || [];
        render();
      } catch (e) {
        document.getElementById("empty").style.display = "block";
        document.getElementById("empty").textContent =
          "ページ一覧を読み込めませんでした。GitHub Pages 等のサーバー経由で開いてください。";
      }
    }

    function render() {
      const cats = ["すべて", ...new Set(allPages.map(p => p.category).filter(Boolean))];
      const catBox = document.getElementById("categories");
      catBox.innerHTML = "";
      cats.forEach(c => {
        const chip = document.createElement("div");
        chip.className = "chip" + (c === activeCat ? " active" : "");
        chip.textContent = c;
        chip.onclick = () => { activeCat = c; render(); };
        catBox.appendChild(chip);
      });

      const grid = document.getElementById("grid");
      grid.innerHTML = "";
      const shown = allPages.filter(p => activeCat === "すべて" || p.category === activeCat);
      document.getElementById("empty").style.display = shown.length ? "none" : "block";
      shown.forEach(p => {
        const a = document.createElement("a");
        a.className = "card";
        a.href = p.file;
        a.innerHTML = `
          <span class="cat">${p.category || "その他"}</span>
          <h2>${p.title}</h2>
          <div class="summary">${p.summary || ""}</div>
          <div class="tags">${(p.tags || []).map(t => `<span>${t}</span>`).join("")}</div>
        `;
        grid.appendChild(a);
      });
    }

    load();
  </script>
</body>
</html>
