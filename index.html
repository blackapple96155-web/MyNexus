<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MyNexus</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f5ef;
      --surface: #fffdf8;
      --surface-strong: #ffffff;
      --ink: #25221d;
      --muted: #6f6a60;
      --line: #e6ded0;
      --accent: #1f7a6d;
      --accent-ink: #0f3c36;
      --warm: #c7673a;
      --shadow: 0 16px 40px rgba(51, 42, 26, 0.10);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(31, 122, 109, 0.08), transparent 360px),
        var(--bg);
      color: var(--ink);
      line-height: 1.75;
    }

    a {
      color: var(--accent-ink);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .shell {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      padding: 54px 0 28px;
    }

    .site-title {
      margin: 0;
      font-size: clamp(2.4rem, 6vw, 5rem);
      line-height: 1;
      letter-spacing: 0;
    }

    .lead {
      max-width: 720px;
      margin: 18px 0 0;
      color: var(--muted);
      font-size: 1.05rem;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin: 18px 0 26px;
    }

    .search,
    .category-select {
      width: 100%;
      min-height: 46px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-strong);
      color: var(--ink);
      font: inherit;
      box-shadow: 0 1px 0 rgba(255, 255, 255, 0.6) inset;
    }

    .search {
      padding: 0 14px;
    }

    .category-select {
      padding: 0 36px 0 12px;
    }

    .status-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 0.92rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 16px;
      padding-bottom: 48px;
    }

    .page-card {
      display: flex;
      flex-direction: column;
      min-height: 230px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      box-shadow: var(--shadow);
      text-decoration: none;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .page-card:hover,
    .page-card:focus-visible {
      border-color: rgba(31, 122, 109, 0.45);
      box-shadow: 0 20px 46px rgba(31, 122, 109, 0.16);
      transform: translateY(-2px);
      outline: none;
    }

    .page-card h2 {
      margin: 10px 0 8px;
      font-size: 1.22rem;
      line-height: 1.35;
      letter-spacing: 0;
      color: var(--ink);
    }

    .page-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: auto;
      padding-top: 18px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 2px 9px;
      border-radius: 999px;
      background: rgba(31, 122, 109, 0.10);
      color: var(--accent-ink);
      font-weight: 650;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 1px 8px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.62);
    }

    .empty {
      grid-column: 1 / -1;
      padding: 28px;
      border: 1px dashed var(--line);
      border-radius: 8px;
      background: rgba(255, 253, 248, 0.68);
      color: var(--muted);
    }

    .empty strong {
      color: var(--ink);
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 22px 0 34px;
      color: var(--muted);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      .toolbar,
      .status-row {
        grid-template-columns: 1fr;
        align-items: stretch;
      }

      .status-row {
        display: grid;
      }

      header {
        padding-top: 38px;
      }
    }
  </style>
</head>
<body>
  <header class="shell">
    <h1 class="site-title">MyNexus</h1>
    <p class="lead">「質問！」で始まる問いへの解説ページを集めた知識ベースです。ページが増えるほど、関連する知識がリンクでつながっていきます。</p>
  </header>

  <main class="shell">
    <div class="toolbar" aria-label="ページの検索と絞り込み">
      <input id="search" class="search" type="search" placeholder="キーワードで検索" autocomplete="off">
      <select id="category" class="category-select" aria-label="カテゴリで絞り込み">
        <option value="">すべてのカテゴリ</option>
      </select>
    </div>

    <div class="status-row">
      <span id="count">読み込み中...</span>
      <span id="updated">data/pages.json を参照</span>
    </div>

    <section id="pages" class="grid" aria-live="polite"></section>
  </main>

  <footer class="shell">
    <span>MyNexus knowledge base</span>
  </footer>

  <script>
    const state = {
      pages: [],
      query: "",
      category: ""
    };

    const pagesEl = document.querySelector("#pages");
    const countEl = document.querySelector("#count");
    const updatedEl = document.querySelector("#updated");
    const searchEl = document.querySelector("#search");
    const categoryEl = document.querySelector("#category");

    const collator = new Intl.Collator("ja");

    function escapeHtml(value) {
      return String(value ?? "").replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        "\"": "&quot;",
        "'": "&#39;"
      }[char]));
    }

    function normalize(value) {
      return String(value ?? "").toLowerCase();
    }

    function pageMatches(page) {
      const haystack = normalize([
        page.title,
        page.category,
        page.summary,
        ...(page.tags || [])
      ].join(" "));
      const queryOk = !state.query || haystack.includes(normalize(state.query));
      const categoryOk = !state.category || page.category === state.category;
      return queryOk && categoryOk;
    }

    function renderCategories() {
      const categories = [...new Set(state.pages.map((page) => page.category).filter(Boolean))]
        .sort(collator.compare);

      categoryEl.innerHTML = '<option value="">すべてのカテゴリ</option>' + categories
        .map((category) => `<option value="${escapeHtml(category)}">${escapeHtml(category)}</option>`)
        .join("");
    }

    function renderPages() {
      const filtered = state.pages.filter(pageMatches);
      countEl.textContent = `${filtered.length} / ${state.pages.length} ページ`;

      if (!state.pages.length) {
        pagesEl.innerHTML = `
          <div class="empty">
            <strong>まだページはありません。</strong><br>
            「質問！」で始まる質問を追加すると、ここに解説ページが並びます。
          </div>
        `;
        return;
      }

      if (!filtered.length) {
        pagesEl.innerHTML = `
          <div class="empty">
            <strong>該当するページがありません。</strong><br>
            検索語やカテゴリを変えてみてください。
          </div>
        `;
        return;
      }

      pagesEl.innerHTML = filtered.map((page) => {
        const tags = (page.tags || []).slice(0, 4)
          .map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`)
          .join("");
        return `
          <a class="page-card" href="${escapeHtml(page.file)}">
            <span class="pill">${escapeHtml(page.category || "未分類")}</span>
            <h2>${escapeHtml(page.title)}</h2>
            <p>${escapeHtml(page.summary || "要約はまだありません。")}</p>
            <div class="meta">
              <span>${escapeHtml(page.created || "")}</span>
              ${tags}
            </div>
          </a>
        `;
      }).join("");
    }

    async function loadPages() {
      try {
        const response = await fetch("data/pages.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }
        const data = await response.json();
        state.pages = Array.isArray(data.pages)
          ? data.pages.slice().sort((a, b) => String(b.created || "").localeCompare(String(a.created || "")))
          : [];
        updatedEl.textContent = data.description || "data/pages.json を参照";
        renderCategories();
        renderPages();
      } catch (error) {
        countEl.textContent = "読み込みに失敗しました";
        pagesEl.innerHTML = `
          <div class="empty">
            <strong>data/pages.json を読み込めませんでした。</strong><br>
            ファイルの配置と JSON の形式を確認してください。
          </div>
        `;
      }
    }

    searchEl.addEventListener("input", (event) => {
      state.query = event.target.value.trim();
      renderPages();
    });

    categoryEl.addEventListener("change", (event) => {
      state.category = event.target.value;
      renderPages();
    });

    loadPages();
  </script>
</body>
</html>
